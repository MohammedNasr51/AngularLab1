<div class="navbar bg-base-100 shadow-md sticky top-0 z-50">
  <!-- Logo / Brand -->
  <div class="navbar-start">
    <a routerLink="/home" class="btn btn-ghost text-xl font-extrabold gap-2 text-primary">
      🎓 EduZone
    </a>
  </div>

  <!-- Desktop Links -->
  <div class="navbar-center hidden lg:flex">
    <ul class="menu menu-horizontal px-1 gap-1">
      <li>
        <a routerLink="/home" routerLinkActive="active" class="rounded-lg font-medium">Home</a>
      </li>
      <li>
        <a routerLink="/courses" routerLinkActive="active" class="rounded-lg font-medium"
          >Courses</a
        >
      </li>
      <li>
        <a routerLink="/about-us" routerLinkActive="active" class="rounded-lg font-medium"
          >About Us</a
        >
      </li>
      <li>
        <a routerLink="/contact-us" routerLinkActive="active" class="rounded-lg font-medium"
          >Contact</a
        >
      </li>
    </ul>
  </div>

  <!-- Right Side -->
  <div class="navbar-end gap-2">
    <!-- Mobile Dropdown -->
    <div class="dropdown dropdown-end lg:hidden">
      <div tabindex="0" role="button" class="btn btn-ghost btn-circle">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="h-5 w-5"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M4 6h16M4 12h16M4 18h7"
          />
        </svg>
      </div>
      <ul
        tabindex="-1"
        class="menu menu-sm dropdown-content bg-base-100 rounded-box z-50 mt-3 w-52 p-2 shadow-lg border border-base-200"
      >
        <li>
          <a
            routerLink="/home"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: true }"
            >🏠 Home</a
          >
        </li>
        <li><a routerLink="/courses" routerLinkActive="active">📚 Courses</a></li>
        <li><a routerLink="/about-us" routerLinkActive="active">ℹ️ About Us</a></li>
        <li><a routerLink="/contact-us" routerLinkActive="active">✉️ Contact</a></li>
      </ul>
    </div>

    <!-- CTA -->
    @if (isLoggedIn) {
      <a routerLink="/courses" class="btn btn-primary btn-sm hidden sm:flex"> Get Started </a>
      <button class="btn btn-error btn-sm hidden sm:flex" (click)="logout()">Logout</button>
    } @else {
      <!-- Login Button -->
      <a routerLink="/login" class="btn btn-primary btn-sm hidden sm:flex"> Login </a>
    }
  </div>
</div>
