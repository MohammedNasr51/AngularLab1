<div class="card w-32 bg-base-100 shadow-xl mt-3 ms-5">
  <figure class="p-3 bg-slate-200">
    <img
      class="w-[100px] rounded-full "
      [src]="student.photoUrl"
      alt="Shoes" />
  </figure>
  <div class="card-body bg-stone-700 text-white py-2">
    <h4 class="card-title text-sm">{{ student.name }}</h4>
    <p>{{ student.age }} years old</p>
  </div>
</div>
