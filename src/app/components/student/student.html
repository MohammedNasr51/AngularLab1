<div class="card w-96 bg-base-100 shadow-xl mt-10 ms-5">
  <figure class="p-10 bg-slate-200">
    <img
      class="w-[200px] h-[200px] rounded-full "
      [src]="student.photoUrl"
      alt="Shoes" />
  </figure>
  <div class="card-body bg-stone-700 text-white">
    <h2 class="card-title">
        Name : {{ student.name }}
    </h2>
    <p>
        Age : {{ student.age }} years old
    </p>
  </div>
</div>
